{% extends "base.html" %}
{% block title %}Verify OTP — Sobkaj{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5 col-lg-4">
        <div class="card-glass p-4 p-md-5 text-center">
            <div class="mb-4">
                <i class="bi bi-shield-lock" style="font-size: 3rem; color: #7f5af0;"></i>
                <h2 class="fw-bold mt-3" style="color: #fff;">Verify Your Email</h2>
                <p class="text-muted">
                    We sent a 6-digit code to<br>
                    <strong style="color: #2cb67d;">{{ session.get('reg_email', '') }}</strong>
                </p>
            </div>

            <form method="POST" action="/verify_otp">
                <div class="mb-4">
                    <input type="text" class="form-control text-center" id="otp" name="otp" placeholder="– – – – – –"
                        maxlength="6" style="font-size: 1.2rem; letter-spacing: 6px; font-weight: 600;" required
                        autofocus>
                </div>

                <button type="submit" class="btn btn-primary-glow w-100">
                    <i class="bi bi-check-circle me-1"></i>Verify &amp; Create Account
                </button>
            </form>

            <p class="mt-4 mb-0">
                <a href="/register" class="link-accent">
                    <i class="bi bi-arrow-left me-1"></i>Back to Registration
                </a>
            </p>
        </div>
    </div>
</div>
{% endblock %}
