{% extends "base.html" %}
{% block title %}Login — Sobkaj{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5 col-lg-4">
        <div class="card-glass p-4 p-md-5">
            <div class="text-center mb-4">
                <i class="bi bi-box-arrow-in-right" style="font-size: 2.5rem; color: #7f5af0;"></i>
                <h2 class="fw-bold mt-2" style="color: #fff;">Welcome Back</h2>
                <p class="text-muted">Log in to your Sobkaj account</p>
            </div>

            <form method="POST" action="/login">
                <!-- Email -->
                <div class="mb-3">
                    <label for="email" class="form-label">
                        <i class="bi bi-envelope me-1"></i>Email Address
                    </label>
                    <input type="email" class="form-control" id="email" name="email" placeholder="you@example.com"
                        required autofocus>
                </div>

                <!-- Password -->
                <div class="mb-4">
                    <label for="password" class="form-label">
                        <i class="bi bi-lock me-1"></i>Password
                    </label>
                    <input type="password" class="form-control" id="password" name="password"
                        placeholder="Enter your password" required>
                </div>

                <!-- Submit -->
                <button type="submit" class="btn btn-primary-glow w-100 mb-3">
                    <i class="bi bi-arrow-right-circle me-1"></i>Log In
                </button>
            </form>

            <p class="text-center mb-0">
                Don't have an account?
                <a href="/register" class="link-accent">Register</a>
            </p>
        </div>
    </div>
</div>
{% endblock %}
