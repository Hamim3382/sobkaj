{% extends "base.html" %}
{% block title %}Register — Sobkaj{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 col-lg-5">
        <div class="card-glass p-4 p-md-5">
            <div class="text-center mb-4">
                <h2 class="fw-bold" style="color: #fff;">Create Account</h2>
                <p class="text-muted">Join Sobkaj and get started</p>
            </div>

            <form method="POST" action="/register">
                <!-- Full Name -->
                <div class="mb-3">
                    <label for="full_name" class="form-label">
                        <i class="bi bi-person me-1"></i>Full Name
                    </label>
                    <input type="text" class="form-control" id="full_name" name="full_name"
                        placeholder="Enter your full name" required>
                </div>

                <!-- Email -->
                <div class="mb-3">
                    <label for="email" class="form-label">
                        <i class="bi bi-envelope me-1"></i>Email Address
                    </label>
                    <input type="email" class="form-control" id="email" name="email" placeholder="you@example.com"
                        required>
                </div>

                <!-- Phone -->
                <div class="mb-3">
                    <label for="phone" class="form-label">
                        <i class="bi bi-telephone me-1"></i>Phone Number
                    </label>
                    <input type="text" class="form-control" id="phone" name="phone" placeholder="01XXXXXXXXX">
                </div>

                <!-- Password -->
                <div class="mb-3">
                    <label for="password" class="form-label">
                        <i class="bi bi-lock me-1"></i>Password
                    </label>
                    <input type="password" class="form-control" id="password" name="password"
                        placeholder="Create a password" required>
                </div>

                <!-- Confirm Password -->
                <div class="mb-3">
                    <label for="confirm_password" class="form-label">
                        <i class="bi bi-lock-fill me-1"></i>Confirm Password
                    </label>
                    <input type="password" class="form-control" id="confirm_password" name="confirm_password"
                        placeholder="Re-enter your password" required>
                </div>

                <!-- Role -->
                <div class="mb-4">
                    <label for="role" class="form-label">
                        <i class="bi bi-people me-1"></i>I want to join as
                    </label>
                    <select class="form-select" id="role" name="role">
                        <option value="customer" selected>Customer — I need services</option>
                        <option value="worker">Worker — I provide services</option>
                    </select>
                </div>

                <!-- Submit -->
                <button type="submit" class="btn btn-primary-glow w-100 mb-3">
                    <i class="bi bi-send me-1"></i>Send Verification Code
                </button>
            </form>

            <p class="text-center mb-0">
                Already have an account?
                <a href="/login" class="link-accent">Log In</a>
            </p>
        </div>
    </div>
</div>
{% endblock %}
