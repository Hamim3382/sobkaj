{% extends "base.html" %}
{% block title %}Leave a Review — Sobkaj{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 col-lg-5">
        <div class="card-glass p-4 p-md-5">
            <div class="text-center mb-4">
                <i class="bi bi-star-half" style="font-size: 2.5rem; color: #f59e0b;"></i>
                <h2 class="fw-bold mt-2" style="color: #fff;">Rate Your Experience</h2>
                <p class="text-muted">
                    Service by <strong style="color: #2cb67d;">{{ booking.worker_name }}</strong>
                    on {{ booking.service_date }}
                </p>
            </div>

            <form method="POST" action="/leave_review/{{ booking.booking_id }}">
                <!-- Star Rating -->
                <div class="mb-4 text-center">
                    <label class="form-label d-block">How would you rate this service?</label>
                    <div class="d-flex justify-content-center gap-2 mt-2">
                        {% for i in range(1, 6) %}
                        <div>
                            <input type="radio" class="btn-check" name="stars" id="star{{ i }}" value="{{ i }}"
                                {{ 'checked' if i==5 }} required>
                            <label class="btn btn-outline-warning px-3 py-2" for="star{{ i }}"
                                style="font-size: 1.3rem;">
                                {{ i }} ⭐
                            </label>
                        </div>
                        {% endfor %}
                    </div>
                </div>

                <!-- Review Text -->
                <div class="mb-4">
                    <label for="review_text" class="form-label">
                        <i class="bi bi-chat-left-text me-1"></i>Write a Review (optional)
                    </label>
                    <textarea class="form-control" id="review_text" name="review_text" rows="4"
                        placeholder="How was the service?"></textarea>
                </div>

                <!-- Submit -->
                <button type="submit" class="btn btn-primary-glow w-100">
                    <i class="bi bi-send me-1"></i>Submit Review
                </button>
            </form>

            <p class="mt-3 text-center mb-0">
                <a href="/my_bookings" class="link-accent">
                    <i class="bi bi-arrow-left me-1"></i>Back to My Bookings
                </a>
            </p>
        </div>
    </div>
</div>
{% endblock %}
